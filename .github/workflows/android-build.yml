name: Android Release Build

on:
  release:
    types:
      - created
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/notif-logs-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: notif-logs-debug-apk
          path: release/notif-logs-debug.apk

      - name: Upload APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" release/notif-logs-debug.apk --clobber
