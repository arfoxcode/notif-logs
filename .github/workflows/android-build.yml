name: Android Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload APK to, example: v2.4.0"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/notif-logs-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: notif-logs-debug-apk
          path: release/notif-logs-debug.apk

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${RELEASE_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "No release tag was provided. Use workflow_dispatch with a tag like v2.4.0."
            exit 1
          fi

          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Notif Logs $TAG" --notes "APK build from GitHub Actions."
          gh release upload "$TAG" release/notif-logs-debug.apk --clobber
